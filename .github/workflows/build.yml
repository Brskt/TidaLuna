name: Build

on:
  push:
    branches: [lunar-cef]
    tags: ['v*']
  pull_request:
    branches: [lunar-cef]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            cmake \
            ninja-build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: oven-sh/setup-bun@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check TOML formatting
        run: taplo fmt --check
      - name: Check Rust formatting
        run: cargo xtask fmt
      - name: Clippy
        run: cargo xtask clippy

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            cmake \
            ninja-build

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle --release

      - name: Build updater
        run: cargo xtask build-updater --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tidalunar-linux-amd64
          path: dist/

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libasound2-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            cmake \
            ninja-build

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle --release

      - name: Build updater
        run: cargo xtask build-updater --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tidalunar-linux-arm64
          path: dist/

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install Ninja
        run: choco install ninja -y

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle --release

      - name: Build updater
        run: cargo xtask build-updater --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tidalunar-windows-amd64
          path: dist/

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install Ninja
        run: choco install ninja -y

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle --release

      - name: Build updater
        run: cargo xtask build-updater --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tidalunar-windows-arm64
          path: dist/

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tidalunar-macos-arm64
          path: dist/

  release:
    needs: [build-linux-amd64, build-linux-arm64, build-windows-amd64, build-windows-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Install signing dependency
        run: pip install cryptography

      - name: Prepare and sign release assets
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          mkdir -p release-assets

          for target in linux-amd64 linux-arm64 windows-amd64 windows-arm64; do
            dir="artifacts/tidalunar-${target}"
            if [ ! -d "$dir" ]; then
              echo "Warning: $dir not found, skipping"
              continue
            fi

            # Rename manifest to platform-specific name
            if [ -f "$dir/manifest.json" ]; then
              cp "$dir/manifest.json" "release-assets/manifest-${target}.json"
            fi

            # Sign manifest
            if [ -n "$UPDATE_SIGNING_KEY" ] && [ -f "release-assets/manifest-${target}.json" ]; then
              python3 scripts/sign-manifest.py "release-assets/manifest-${target}.json"
            fi

            # Zip the bundle
            (cd "$dir" && zip -r "$GITHUB_WORKSPACE/release-assets/tidalunar-${target}.zip" .)
            echo "Created tidalunar-${target}.zip"
          done

          ls -la release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            release-assets/*
