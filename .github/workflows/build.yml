name: Build

on:
  push:
    branches: [lunar-cef]
  pull_request:
    branches: [lunar-cef]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            cmake \
            ninja-build

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: oven-sh/setup-bun@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check TOML formatting
        run: taplo fmt --check
      - name: Check Rust formatting
        run: cargo xtask fmt
      - name: Clippy
        run: cargo xtask clippy

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            cmake \
            ninja-build

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tidalunar-linux-amd64
          path: dist/

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            cmake \
            ninja-build

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tidalunar-linux-arm64
          path: dist/

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install Ninja
        run: choco install ninja -y

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tidalunar-windows-amd64
          path: dist/

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install Ninja
        run: choco install ninja -y

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tidalunar-windows-arm64
          path: dist/

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Install Ninja
        run: brew install ninja

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build and bundle
        run: cargo xtask bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tidalunar-macos-arm64
          path: dist/
