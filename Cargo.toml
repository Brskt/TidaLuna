[workspace]
members = ["xtask"]

[package]
name = "tidalunar"
version = "0.1.1"
edition = "2024"


[profile.dev.package."*"]
opt-level = 2

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true


[dependencies]
cef = { version = "145.6.1", features = ["build-util"] }
tokio = { version = "1.50.0", features = [
  "rt-multi-thread",
  "net",
  "sync",
  "time",
  "macros",
  "process",
  "io-util",
] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
anyhow = "1.0.102"
aes = "0.8.4"
cbc = "0.1.2"
ctr = "0.9.2"
base64 = "0.22.1"
tracing = "0.1.44"
reqwest = { version = "0.13.2", default-features = false, features = [
  "stream",
  "blocking",
  "rustls",
  "http2",
  "cookies",
] }
futures-util = "0.3.32"
time = { version = "0.3.47", features = ["local-offset"] }
oauth2 = { version = "5.0.0", default-features = false }
cpal = "0.17"
rtrb = "0.3"
rusqlite = { version = "0.39", features = ["bundled"] }
tempfile = "3"
rubato = "1.0"
audioadapter-buffers = "2.0"
symphonia = { version = "0.5.5", features = ["flac", "aac", "isomp4"] }
dash-mpd = { version = "0.20", default-features = false }
souvlaki = "0.8"
oxc = { version = "0.121", features = ["semantic", "transformer", "codegen"] }

[target.'cfg(target_os = "windows")'.dependencies]
wasapi = "0.22.0"
windows-sys = { version = "0.61", features = [
  "Win32_UI_WindowsAndMessaging",
  "Win32_UI_Shell",
  "Win32_Graphics_Gdi",
  "Win32_System_Registry",
  "Win32_System_Com",
  "Win32_System_Console",
] }

[target.'cfg(target_os = "windows")'.build-dependencies]
winres = "0.1"
