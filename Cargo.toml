[workspace]
members = ["xtask"]

[package]
name = "tidal-rs"
version = "0.1.1"
edition = "2024"


[features]
console = []

[profile.dev.package."*"]
opt-level = 2

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true


[dependencies]
tao = "0.34.5"
tokio = { version = "1.49.0", features = [
  "rt-multi-thread",
  "net",
  "sync",
  "time",
  "macros",
] }
wry = { version = "0.54.2", features = ["devtools"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
anyhow = "1.0.102"
aes = "0.8.4"
cbc = "0.1.2"
ctr = "0.9.2"
base64 = "0.22.1"
tracing = "0.1.44"
reqwest = { version = "0.12.28", default-features = false, features = [
  "stream",
  "rustls-tls-native-roots",
] }
once_cell = "1.21.3"
futures-util = "0.3.32"
time = { version = "0.3.47", features = ["local-offset"] }
oauth2 = { version = "5.0.0", default-features = false }
rodio = { version = "0.22.1", default-features = false, features = [
  "playback",
  "symphonia-flac",
  "symphonia-aac",
  "symphonia-isomp4",
] }
symphonia = { version = "0.5.5", features = ["flac", "aac", "isomp4"] }
image = { version = "0.25.9", default-features = false, features = ["ico"] }

[target.'cfg(target_os = "windows")'.dependencies]
wasapi = "0.22.0"

[target.'cfg(target_os = "windows")'.build-dependencies]
tauri-winres = "0.3"
