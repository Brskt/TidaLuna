[workspace]
members = ["xtask"]

[package]
name = "tidalunar"
version = "0.1.1"
edition = "2024"


[features]
console = []

[profile.dev.package."*"]
opt-level = 2

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true


[dependencies]
cef = { version = "145.5.0", features = ["build-util"] }
tokio = { version = "1.49.0", features = [
  "rt-multi-thread",
  "net",
  "sync",
  "time",
  "macros",
] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
anyhow = "1.0.102"
aes = "0.8.4"
cbc = "0.1.2"
ctr = "0.9.2"
base64 = "0.22.1"
tracing = "0.1.44"
reqwest = { version = "0.12.28", default-features = false, features = [
  "stream",
  "rustls-tls-native-roots",
  "http2",
] }
once_cell = "1.21.3"
futures-util = "0.3.32"
time = { version = "0.3.47", features = ["local-offset"] }
oauth2 = { version = "5.0.0", default-features = false }
cpal = "0.15"
rtrb = "0.3"
rusqlite = { version = "0.32", features = ["bundled"] }
tempfile = "3"
rubato = "0.14"
symphonia = { version = "0.5.5", features = ["flac", "aac", "isomp4"] }
dash-mpd = { version = "0.17", default-features = false }
souvlaki = "0.8"

[target.'cfg(target_os = "windows")'.dependencies]
wasapi = "0.22.0"
windows-sys = { version = "0.61", features = [
  "Win32_UI_WindowsAndMessaging",
  "Win32_UI_Shell",
  "Win32_Graphics_Gdi",
  "Win32_System_Registry",
  "Win32_System_Com",
] }

[target.'cfg(target_os = "windows")'.build-dependencies]
winres = "0.1"
